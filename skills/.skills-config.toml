version = "1.0.0"
description = "Company skills catalog"

[skill_levels]
  [skill_levels.junior]
  required_categories = ["core", "tools"]

  [skill_levels.mid_level]
  required_categories = ["core", "tools", "collaboration"]

  [skill_levels.senior]
  required_categories = ["core", "tools", "collaboration", "architecture"]

  [skill_levels.staff]
  required_categories = ["all"]

  [skill_levels.principal]
  required_categories = ["all"]

[categories]
  [categories.core]
  name = "Core Skills"
  description = "Fundamental engineering skills"
  skills = [
    { name = "Problem Solving", file = "problem-solving.md", tags = ["debugging", "troubleshooting"], required = true },
    { name = "Testing Fundamentals", file = "testing-fundamentals.md", tags = ["quality", "testing"], required = true },
    { name = "Debugging", file = "debugging.md", tags = ["debugging", "tools"], required = true }
  ]

  [categories.collaboration]
  name = "Collaboration Skills"
  description = "Working effectively with others"
  skills = [
    { name = "Code Review", file = "code-review.md", tags = ["review", "quality"], required = true },
    { name = "Documentation", file = "documentation.md", tags = ["docs", "communication"], required = true },
    { name = "Communication", file = "communication.md", tags = ["communication", "soft-skills"], required = false }
  ]

  [categories.architecture]
  name = "Architecture Skills"
  description = "System design and patterns"
  skills = [
    { name = "Design Patterns", file = "design-patterns.md", tags = ["patterns", "design"], required = true },
    { name = "SOLID Principles", file = "solid-principles.md", tags = ["patterns", "design"], required = true },
    { name = "Clean Code", file = "clean-code.md", tags = ["quality", "maintenance"], required = false }
  ]

  [categories.security]
  name = "Security Skills"
  description = "Secure coding practices"
  skills = [
    { name = "Secure Coding", file = "secure-coding.md", tags = ["security", "best-practices"], required = true },
    { name = "Data Protection", file = "data-protection.md", tags = ["security", "privacy"], required = true },
    { name = "Authentication", file = "authentication.md", tags = ["security", "auth"], required = true }
  ]

  [categories.performance]
  name = "Performance Skills"
  description = "Optimization and monitoring"
  skills = [
    { name = "Optimization", file = "optimization.md", tags = ["performance", "optimization"], required = true },
    { name = "Scalability", file = "scalability.md", tags = ["performance", "architecture"], required = false },
    { name = "Monitoring", file = "monitoring.md", tags = ["performance", "observability"], required = true }
  ]

  [categories.tools]
  name = "Tool Skills"
  description = "Development tools and workflows"
  skills = [
    { name = "Git Workflow", file = "git-workflow.md", tags = ["git", "vcs"], required = true },
    { name = "IDE Setup", file = "ide-setup.md", tags = ["tools", "ide"], required = false },
    { name = "CLI Commands", file = "cli-commands.md", tags = ["tools", "cli"], required = true }
  ]

  [categories.ai_assisted]
  name = "AI-Assisted Development"
  description = "Working with AI tools"
  skills = [
    { name = "Prompt Engineering", file = "prompt-engineering.md", tags = ["ai", "prompts"], required = false },
    { name = "Code Generation", file = "code-generation.md", tags = ["ai", "coding"], required = false },
    { name = "Review Automation", file = "review-automation.md", tags = ["ai", "review"], required = false }
  ]
